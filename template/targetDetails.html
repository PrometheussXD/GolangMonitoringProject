<!DOCTYPE html>
<html>

<head>

    <title>Target Details</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

</head>

<body>

<div class="container mt-5">

    <h1>
        Target History
    </h1>

    <table class="table table-striped">

        <thead>

        <tr>

            <th>Status</th>
            <th>Response Time</th>
            <th>Checked At</th>

        </tr>

        </thead>

        <tbody>

        {{ range .Results }}

        <tr>

            <td>

                {{ if .IsUp }}

                <span class="badge bg-success">
UP
</span>

                {{ else }}

                <span class="badge bg-danger">
DOWN
</span>

                {{ end }}

            </td>

            <td>
                {{ .ResponseTime }} ms
            </td>

            <td>
                {{ .CheckedAt }}
            </td>

        </tr>

        {{ end }}

        </tbody>

    </table>

</div>

</body>

</html>
